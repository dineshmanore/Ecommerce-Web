spring:
  application:
    name: ecommerce-backend
  data:
    mongodb:
      uri: ${MONGO_URI}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong}
  expiration: 86400000 # 24 hours in milliseconds

cors:
  allowed-origins: "*"

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: DEBUG